services:
  db:
    image: mysql:8.4
    container_name: hopp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - hopp_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hopp-network

  wordpress:
    build:
      context: .
      dockerfile: docker/wordpress/Dockerfile
    container_name: hopp_wordpress
    restart: unless-stopped
    command: ["sh", "/usr/local/bin/hopp-wordpress-start.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
      HOPP_ADMIN_NOTIFICATION_EMAIL: ${HOPP_ADMIN_NOTIFICATION_EMAIL:-}
      HOPP_MAIL_FROM_ADDRESS: ${HOPP_MAIL_FROM_ADDRESS:-}
      HOPP_MAIL_FROM_NAME: ${HOPP_MAIL_FROM_NAME:-}
      HOPP_MAIL_TRANSPORT: ${HOPP_MAIL_TRANSPORT:-}
      HOPP_SMTP_HOST: ${HOPP_SMTP_HOST:-}
      HOPP_SMTP_PORT: ${HOPP_SMTP_PORT:-}
      HOPP_SMTP_SECURE: ${HOPP_SMTP_SECURE:-}
      HOPP_SMTP_USER: ${HOPP_SMTP_USER:-}
      HOPP_SMTP_PASSWORD: ${HOPP_SMTP_PASSWORD:-}
      HOPP_SMTP_AUTO_TLS: ${HOPP_SMTP_AUTO_TLS:-false}
    volumes:
      - hopp_wordpress_data:/var/www/html
      - ./wp-content/themes/hopp:/var/www/html/wp-content/themes/hopp
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/hopp-uploads.ini:ro
      - ./docker/wordpress/start-wordpress.sh:/usr/local/bin/hopp-wordpress-start.sh:ro
      - ./docker/wordpress/apply-aba-payway-patch.php:/usr/local/share/hopp/apply-aba-payway-patch.php:ro
      - ./docker/wordpress/mu-plugins:/usr/local/share/hopp/mu-plugins:ro
    networks:
      - hopp-network

volumes:
  hopp_mysql_data:
  hopp_wordpress_data:

networks:
  hopp-network:
    driver: bridge
