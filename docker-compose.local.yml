services:
  wordpress:
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      VIRTUAL_HOST: ${WORDPRESS_VIRTUAL_HOST}
      VIRTUAL_PORT: 80
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_HOME', '${WORDPRESS_LOCAL_URL:-http://localhost:8080}' );
        define( 'WP_SITEURL', '${WORDPRESS_LOCAL_URL:-http://localhost:8080}' );
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
        define( 'HOPP_ENABLE_DEMO_SEED', true );
    networks:
      - hopp-network
      - proxy-network

networks:
  proxy-network:
    external: true
